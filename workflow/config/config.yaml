# Output directories

# Reports (now in data volume for persistence)
reports_output: "/data/processed/reports/"

# Final outputs
all_phages_fasta: "/data/processed/sequences/all_phages.fasta"
all_proteins_fasta: "/data/processed/sequences/all_proteins.fasta"
# DEPRECATED: all_hosts_fasta is no longer used. Use host_fasta_mapping instead.
# Kept for backward compatibility with older scripts.
all_hosts_fasta: "/data/processed/sequences/all_hosts.fasta"

# Metadata
intermediate_csv_output: "/data/intermediate/csv"
merged_csv_output: "/data/intermediate/csv/merged/"

# Databases files
duckdb_output: "/data/processed/databases/phage_database.duckdb"
optimized_duckdb_output: "/data/processed/databases/phage_database_optimized.duckdb"

database_validation_report_output: "/data/processed/reports/database_validation.html"


# -----------------------------------
# Fasta files configuration
# -----------------------------------

phage_fasta_compressed_output: "/data/raw/phage_fasta_compressed/"
phage_fasta_extracted_output: "/data/raw/phage_fasta_extracted/"
phage_fasta_merged_output: "/data/intermediate/fasta/phages/"

protein_fasta_compressed_output: "/data/raw/protein_fasta_compressed/"
protein_fasta_extracted_output: "/data/raw/protein_fasta_extracted/"
protein_fasta_merged_output: "/data/intermediate/fasta/proteins/" # Used in sequence.smk to generate the merged fasta file (one per source)

# Host genomes
host_genomes_intermediate: "/data/intermediate/fasta/hosts"
host_fasta_mapping: "/data/processed/sequences/host_fasta_mapping.json"
host_index_complete_flag: "/data/processed/sequences/.host_indexes_complete"
host_metadata_output: "/data/intermediate/csv/merged/host_metadata.csv"
assembly_metadata_output: "/data/intermediate/csv/merged/assembly_metadata.csv"
phage_host_links_output: "/data/intermediate/csv/merged/phage_host_links.csv"
phage_host_candidates_output: "/data/intermediate/csv/merged/phage_host_candidates.csv"
phage_host_assemblies_output: "/data/intermediate/csv/merged/phage_host_assemblies.csv"
host_download_log: "/data/logs/host_download.log"
host_failure_log: "/data/logs/host_download_failures.log"
host_fasta_qc_log: "/data/logs/host_fasta_qc.csv"
host_status_report: "/data/intermediate/csv/merged/host_status_report.csv"

# Host download settings
ncbi_email: "phage.pipeline@example.com"  # Required by NCBI - update with your email
max_host_download_retries: 3
host_download_delay: 0.5  # seconds between requests
prefer_complete_genomes: true
assembly_levels: ["Complete Genome", "Chromosome", "Scaffold"]  # Priority order
metadata_only_mode: false  # Set to true to skip downloads and only gather metadata
skip_existing_downloads: true  # Skip already downloaded genomes
validate_file_checksums: true  # Validate downloaded file integrity


