# -------------------------------
# Runtime path roots (container-first)
# -------------------------------
# These absolute paths are the canonical in-container targets.
# Snakefile rewrites them at runtime using:
#   PBI_DATA_DIR (default local: data)
#   PBI_PRIVATE_DATA_DIR (default local: private_data)
#   PBI_LOGS_DIR (default local: data)
#
# Docker-compose defaults:
#   /data          <- named volume pbi-data
#   /private-data  <- ./private_data
#   /pipeline-logs <- ./pipeline_logs

# Reports, logs and interesting intermediate files (bind-mounted for direct host access)
# Subdirectory layout under /pipeline-logs:
#   logs/    - Plain-text and CSV log files produced during pipeline execution
#   reports/ - HTML validation and statistics reports
#   csv/     - Intermediate CSV/JSON files useful for post-run analysis
reports_output: "/pipeline-logs/reports/"
database_validation_report_output: "/pipeline-logs/reports/database_validation.html"

# Database outputs
duckdb_output: "/data/processed/databases/phage_database.duckdb"
optimized_duckdb_output: "/data/processed/databases/phage_database_optimized.duckdb"

# Final sequence outputs
all_phages_fasta: "/data/processed/sequences/all_phages.fasta"
all_proteins_fasta: "/data/processed/sequences/all_proteins.fasta"
# DEPRECATED: all_hosts_fasta is no longer used. Use host_fasta_mapping instead.
# Kept for backward compatibility with older scripts.
all_hosts_fasta: "/data/processed/sequences/all_hosts.fasta"

# Intermediate metadata outputs
intermediate_csv_output: "/data/intermediate/csv"
merged_csv_output: "/data/intermediate/csv/merged/"

# Private-data ingestion and manifest outputs
# The pipeline container mounts ./private_data at /private-data.
# Place one subdirectory per private dataset under private_data/.
# If the directory is empty, pipeline runs with only public data.
# Set to "" or a non-existent path to fully disable.
private_data_root: "/private-data"
private_manifest_output: "/private-data/private_manifest.json"


# -----------------------------------
# Fasta files configuration
# -----------------------------------

phage_fasta_compressed_output: "/data/raw/phage_fasta_compressed/"
phage_fasta_extracted_output: "/data/raw/phage_fasta_extracted/"
phage_fasta_merged_output: "/data/intermediate/fasta/phages/"

protein_fasta_compressed_output: "/data/raw/protein_fasta_compressed/"
protein_fasta_extracted_output: "/data/raw/protein_fasta_extracted/"
protein_fasta_merged_output: "/data/intermediate/fasta/proteins/" # Used in sequence.smk to generate the merged fasta file (one per source)

# Host genomes
host_genomes_intermediate: "/data/intermediate/fasta/hosts"
host_fasta_mapping: "/data/processed/sequences/host_fasta_mapping.json"
private_host_mapping: "/private-data/private_host_fasta_mapping.json"
# Per-source private phage FASTA copies live under this directory:
#   /private-data/phages/<source_db>/phage.fasta  (+ .fai index)
# The mapping JSON (source_db → phage.fasta path) is written at the path below and
# consumed by SequenceRetriever to route private-phage sequence lookups.
# Host files are served directly from each source's hosts/ directory — no copy.
private_phage_mapping: "/private-data/private_phage_mapping.json"
private_phage_genomes_intermediate: "/private-data/phages"
host_index_complete_flag: "/pipeline-logs/csv/.host_indexes_complete"
host_metadata_output: "/pipeline-logs/csv/host_metadata.csv"
assembly_metadata_output: "/pipeline-logs/csv/assembly_metadata.csv"
phage_host_links_output: "/pipeline-logs/csv/phage_host_links.csv"
phage_host_candidates_output: "/pipeline-logs/csv/phage_host_candidates.csv"
phage_host_assemblies_output: "/pipeline-logs/csv/phage_host_assemblies.csv"
host_resolution_cache_output: "/pipeline-logs/csv/host_token_resolution_cache.json"
host_download_log: "/pipeline-logs/logs/host_download.log"
host_failure_log: "/pipeline-logs/logs/host_download_failures.log"
host_fasta_qc_log: "/pipeline-logs/logs/host_fasta_qc.csv"
host_status_report: "/pipeline-logs/reports/host_status_report.csv"
create_host_mapping_log: "/pipeline-logs/logs/create_host_mapping.log"
index_individual_host_sequences_log: "/pipeline-logs/logs/index_individual_host_sequences.log"
create_host_status_report_log: "/pipeline-logs/logs/create_host_status_report.log"
merge_phage_fasta_log: "/pipeline-logs/logs/merge_phage_fasta.log"
merge_protein_fasta_log: "/pipeline-logs/logs/merge_protein_fasta.log"
index_phage_sequences_log: "/pipeline-logs/logs/index_phage_sequences.log"
index_protein_sequences_log: "/pipeline-logs/logs/index_protein_sequences.log"

# Host download settings
ncbi_email: "phage.pipeline@example.com"  # Fallback only — set NCBI_EMAIL env variable instead (see .env.example)
max_host_download_retries: 3
host_download_delay: 0.5  # seconds between requests
prefer_complete_genomes: true
assembly_levels: ["Complete Genome", "Chromosome", "Scaffold"]  # Priority order
metadata_only_mode: false  # Set to true to skip downloads and only gather metadata
skip_existing_downloads: true  # Skip already downloaded genomes
validate_file_checksums: true  # Validate downloaded file integrity
reuse_host_resolution_cache: true  # Reuse token resolution cache across reruns

# Public data provenance and version-pinning foundation
public_data_provider:
  name: "PhageScope"
  release: "rolling"
  snapshot_date: "2026-05-11"
  schema_profile: "phagescope_v1"
  api_base_url: "https://phageapi.deepomics.org"
  provenance_mode: "config_pinned"

public_data_provenance:
  require_release_or_snapshot: true
  capture_checksums: true
  capture_response_headers: true
  fail_on_schema_mismatch: false
  manifest_json_output: "/pipeline-logs/csv/public_data_manifest.json"
  manifest_csv_output: "/pipeline-logs/csv/public_data_manifest.csv"
  pipeline_run_provenance_json_output: "/pipeline-logs/csv/pipeline_run_provenance.json"
  pipeline_run_provenance_csv_output: "/pipeline-logs/csv/pipeline_run_provenance.csv"


