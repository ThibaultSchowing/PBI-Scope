services:
  # Pipeline service for building the phage database
  pipeline:
    build:
      context: .
      dockerfile: workflow/Dockerfile
    container_name: pbi-pipeline
    # Run as the host user so files written to bind-mounted directories
    # (./pipeline_logs, ./private_data) are owned by you, not root.
    # UID and GID are read from the .env file (see .env.example).
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # Mount data directory to persist database and sequences
      - pbi-data:/data
      # Mount cache directory to persist Snakemake metadata and conda environments
      - pbi-cache:/cache
      # Private datasets (writable). Place subdirectories here, one per private source.
      # Leave the directory empty to run without private data.
      - ./private_data:/private-data
      # Pipeline logs and HTML reports — accessible directly from the repository root.
      - ./pipeline_logs:/pipeline-logs
    environment:
      # Core path roots used by Snakefile/env-aware path replacement
      - HOME=/cache
      - XDG_CACHE_HOME=/cache
      - SNAKEMAKE_OUTPUT_CACHE=/cache
      - SNAKEMAKE_CONDA_PREFIX=/cache/conda
      - PBI_DATA_DIR=/data
      - PBI_LOGS_DIR=/pipeline-logs
      - PBI_PRIVATE_DATA_DIR=/private-data
      # External service credentials
      - NCBI_EMAIL=${NCBI_EMAIL} # Pass NCBI email for Entrez API usage from environment variable
      - NCBI_API_KEY=${NCBI_API_KEY} # Pass NCBI API key for higher rate limits (optional) from environment variable
    networks:
      - pbi-network

  # API service for querying the database
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pbi-api
    ports:
      - "8000:8000"
    volumes:
      # Mount the same data directory (read-only for safety)
      - pbi-data:/data:ro
    environment:
      - DATA_PATH=/data/processed
    #depends_on:
    #  - pipeline
    networks:
      - pbi-network
    restart: unless-stopped

  # Analysis service for direct data access and Jupyter notebooks
  analysis:

    build:
      context: .
      dockerfile: Dockerfile.analysis
    container_name: pbi-analysis
    # Run as the host user so files written to bind-mounted directories
    # (./notebooks, ./outputs) are owned by you, not root.
    # UID and GID are read from the .env file (see .env.example).
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8888:8888"
    volumes:
      # Mount data directory (read-only for safety)
      - pbi-data:/data:ro
      # Mount pipeline logs (read-only) so notebooks can inspect pipeline execution logs/reports
      - ./pipeline_logs:/pipeline-logs:ro
      # Mount private datasets (read-only) so notebooks can resolve private host FASTAs
      # and private phage mapping generated by the pipeline.
      - ./private_data:/private-data:ro
      # Mount notebooks directory for persistent work
      - ./notebooks:/workspace
      # Durable notebook outputs (datasets, plots, model artifacts)
      - ./outputs:/results
      # Mount workflow directory (read-only) for script imports.
      # We shouldn't need the entire workflow here, but this allows notebooks to import Snakemake rules and utility functions if needed.
      #- ./workflow:/app/workflow:ro
      # Mount src directory (read-only) for package imports
      - ./src:/app/src:ro
    environment:
      - DATA_PATH=/data/processed
      - PBI_PRIVATE_DATA_DIR=/private-data
      - PBI_LOGS_DIR=/pipeline-logs
      - PBI_RESULTS_DIR=/results
      # Use writable user locations for Jupyter/IPython state when running as host UID.
      - HOME=/workspace
      - XDG_CACHE_HOME=/.local/cache
      - XDG_CONFIG_HOME=/workspace/.config
      - MPLCONFIGDIR=/workspace/.config/matplotlib
      - IPYTHONDIR=/.local/share/ipython
      - JUPYTERLAB_WORKSPACES_DIR=/.local/share/jupyter/lab/workspaces
      - JUPYTERLAB_SETTINGS_DIR=/.local/share/jupyter/lab/user-settings
      # Tell Jupyter to use /workspace/.jupyter so config migration stays writable
      # when the container runs as arbitrary host UID/GID.
      - JUPYTER_CONFIG_DIR=/workspace/.jupyter
      # Set PYTHONPATH for proper module imports
      - PYTHONPATH=/app
    networks:
      - pbi-network
    restart: unless-stopped

  # Ollama LLM service (Llama 3.1 via GPU)
  # After first start, pull the model with:
  #   docker exec pbi-ollama ollama pull llama3.1:8b
  ollama:
    image: ollama/ollama:latest
    container_name: pbi-ollama
    ports:
      - "11434:11434"
    volumes:
      # Persist downloaded models across container restarts
      - ollama-models:/root/.ollama
    # GPU access — requires NVIDIA drivers + nvidia-container-toolkit on the host.
    # Remove the deploy block if running without a GPU (Ollama falls back to CPU).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - pbi-network
    restart: unless-stopped

  # Agentic chat service (FastAPI + LangChain)
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile.agent
    container_name: pbi-agent
    ports:
      # Access via SSH tunnel: ssh -L 8001:localhost:8001 user@server
      - "8001:8001"
    volumes:
      # Read-only access to the PBI database
      - pbi-data:/data:ro
      # Read-only access to pipeline logs for the log-explorer tool
      - ./pipeline_logs:/pipeline-logs:ro
    environment:
      - DATA_PATH=/data/processed
      - PBI_LOGS_DIR=/pipeline-logs
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      # Security: cap log reads and SQL result sizes to avoid token flooding
      - AGENT_MAX_LOG_SIZE_KB=${AGENT_MAX_LOG_SIZE_KB:-512}
      - AGENT_SQL_ROW_LIMIT=${AGENT_SQL_ROW_LIMIT:-500}
      # Optional API key to protect the /chat/stream endpoint.
      # Set AGENT_API_KEY in your .env file to enable bearer-token auth.
      - AGENT_API_KEY=${AGENT_API_KEY:-}
    depends_on:
      - ollama
    networks:
      - pbi-network
    restart: unless-stopped

volumes:
  # Named volume for persistent data storage
  pbi-data:
    driver: local
  # Named volume for Snakemake cache (conda environments, metadata, logs)
  # This persists across container runs to avoid re-downloading dependencies
  pbi-cache:
    driver: local
  # Named volume for Ollama model weights
  ollama-models:
    driver: local

networks:
  pbi-network:
    driver: bridge
