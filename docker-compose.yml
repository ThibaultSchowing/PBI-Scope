services:
  # Pipeline service for building the phage database
  pipeline:
    build:
      context: .
      dockerfile: workflow/Dockerfile
    container_name: pbi-pipeline
    volumes:
      # Mount data directory to persist database and sequences
      - pbi-data:/data
      # Mount cache directory to persist Snakemake metadata and conda environments
      - pbi-cache:/cache
      # Private datasets (writable). Place subdirectories here, one per private source.
      # Leave the directory empty to run without private data.
      - ./private_data:/private-data
      # Pipeline logs and HTML reports — accessible directly from the repository root.
      - ./pipeline_logs:/pipeline-logs
    environment:
      # Core path roots used by Snakefile/env-aware path replacement
      - SNAKEMAKE_OUTPUT_CACHE=/cache
      - SNAKEMAKE_CONDA_PREFIX=/cache/conda
      - PBI_DATA_DIR=/data
      - PBI_LOGS_DIR=/pipeline-logs
      - PBI_PRIVATE_DATA_DIR=/private-data
      # External service credentials
      - NCBI_EMAIL=${NCBI_EMAIL} # Pass NCBI email for Entrez API usage from environment variable
      - NCBI_API_KEY=${NCBI_API_KEY} # Pass NCBI API key for higher rate limits (optional) from environment variable
    networks:
      - pbi-network

  # API service for querying the database
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pbi-api
    ports:
      - "8000:8000"
    volumes:
      # Mount the same data directory (read-only for safety)
      - pbi-data:/data:ro
    environment:
      - DATA_PATH=/data/processed
    #depends_on:
    #  - pipeline
    networks:
      - pbi-network
    restart: unless-stopped

  # Analysis service for direct data access and Jupyter notebooks
  analysis:

    build:
      context: .
      dockerfile: Dockerfile.analysis
    container_name: pbi-analysis
    deploy:
    resources:
      limits:
        memory: 8G  # Maximum memory
      reservations:
        memory: 4G  # Guaranteed memory
    ports:
      - "8888:8888"
    volumes:
      # Mount data directory (read-only for safety)
      - pbi-data:/data:ro
      # Mount pipeline logs (read-only) so notebooks can inspect pipeline execution logs/reports
      - ./pipeline_logs:/pipeline-logs:ro
      # Mount private datasets (read-only) so notebooks can resolve private host FASTAs
      # and private phage mapping generated by the pipeline.
      - ./private_data:/private-data:ro
      # Mount notebooks directory for persistent work
      - ./notebooks:/workspace
      # Durable notebook outputs (datasets, plots, model artifacts)
      - ./analysis_results:/results
      # Mount workflow directory (read-only) for script imports.
      # We shouldn't need the entire workflow here, but this allows notebooks to import Snakemake rules and utility functions if needed.
      #- ./workflow:/app/workflow:ro
      # Mount src directory (read-only) for package imports
      - ./src:/app/src:ro
    environment:
      - DATA_PATH=/data/processed
      - PBI_PRIVATE_DATA_DIR=/private-data
      - PBI_LOGS_DIR=/pipeline-logs
      - PBI_RESULTS_DIR=/results
      # Set PYTHONPATH for proper module imports
      - PYTHONPATH=/app
    networks:
      - pbi-network
    restart: unless-stopped

volumes:
  # Named volume for persistent data storage
  pbi-data:
    driver: local
  # Named volume for Snakemake cache (conda environments, metadata, logs)
  # This persists across container runs to avoid re-downloading dependencies
  pbi-cache:
    driver: local

networks:
  pbi-network:
    driver: bridge
