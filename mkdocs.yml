site_name: PBI Documentation
site_description: Phage Bacteria Interactions - Docker-first phage-host data pipeline documentation
# Important: set the full site_url for correct absolute links when hosted under /PBI/
site_url: https://ThibaultSchowing.github.io/PBI/
repo_name: ThibaultSchowing/PBI
repo_url: https://github.com/ThibaultSchowing/PBI

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Guides:
      - Overview: guides/overview.md
      - Installation (Docker): guides/installation.md
      - Story (One Read): guides/storytelling.md
      - How It Works: guides/how-it-works.md
      - Analysis Container: guides/analysis-guide.md
      - Pipeline Execution: guides/pipeline-execution.md
      - Private Data Ingestion: guides/private-data-ingestion.md
      - Schema Contracts: guides/schema-contracts.md
      - PBI Package: guides/pbi-package.md
      - Machine Learning: guides/machine-learning.md
      - Docker Advanced: guides/docker-guide.md
  - Database:
      - Overview: database/overview.md
      - Host Resolution: database/host-resolution.md
  - API:
      - Overview: api/overview.md
  - Reference:
      - Commands: reference/commands.md
  - Developer:
      - Code Structure: developer/code-structure.md
  - Future Steps: future-steps.md
  - Changelog: changelog.md

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ThibaultSchowing/PBI
  version:
    provider: mike
