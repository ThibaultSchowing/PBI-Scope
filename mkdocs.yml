site_name: PBI Documentation
site_description: Phage-Bacteria Interaction Database Pipeline - Comprehensive documentation for data integration, API, and analysis
# Important: set the full site_url for correct absolute links when hosted under /PBI/
site_url: https://ThibaultSchowing.github.io/PBI/
repo_name: ThibaultSchowing/PBI
repo_url: https://github.com/ThibaultSchowing/PBI

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Guides:
      - Overview: guides/overview.md
      - Docker Guide: guides/docker-guide.md
      - Local Installation: guides/installation.md
      - Machine Learning: guides/machine-learning.md
  - Database:
      - Overview: database/overview.md
  - API:
      - Overview: api/overview.md
  - Reference:
      - Commands: reference/commands.md
  - Developer:
      - Code Structure: developer/code-structure.md
  - Changelog: changelog.md
  - Archive:
      - README: archive/README.md
      - Docker Architecture: archive/DOCKER_ARCHITECTURE.md
      - Genome Download Quickstart: archive/GENOME_DOWNLOAD_QUICKSTART.md
      - Implementation Summary: archive/IMPLEMENTATION_SUMMARY.md
      - Local Setup: archive/LOCAL_SETUP.md
      - Old Docker Guide: archive/DOCKER.md

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ThibaultSchowing/PBI
  version:
    provider: mike